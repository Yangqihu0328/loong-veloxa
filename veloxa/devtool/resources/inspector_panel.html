<!--
  TASK-20260502-01 A.1.3: DevTool Inspector UI dogfood HTML.

  Loaded as the second Document inside Veloxa's own engine
  (Application::LoadDevtoolDocument, see A.1.6). The two placeholders
  __INLINE_CSS__ and __INLINE_JS__ are replaced at runtime by
  Application::LoadDevtoolDocument with the contents of
  kInspectorPanelCss / kInspectorPanelJs (both also embedded at compile
  time via veloxa/devtool/resources/CMakeLists.txt). Inlining avoids
  triggering DevTool Document <link> / <script src> sub-resource loading
  whose chain has not been validated yet.

  Layout: per creative #1 decision 1, splitter dock holds 3 tabs
  (DOM / Style / Layout) over 3 panel divs. JS toggles the active tab
  by mutating the .active class on tab buttons and panel divs in sync.
-->
<html>
<head><style>__INLINE_CSS__
__INLINE_CONSOLE_CSS__</style></head>
<body>
  <div id="devtool-root">
    <div id="devtool-tabs">
      <button data-tab="dom" class="active">DOM</button>
      <button data-tab="style">Style</button>
      <button data-tab="layout">Layout</button>
      <!-- TASK-20260503-04 D.3 — 4th tab (Console JS REPL + console.log
           bridge). creative-devtool-console §C1 decision A: parallel to
           existing 3 tabs, reuses inspector_panel.js setupTabs protocol. -->
      <button data-tab="console">Console</button>
    </div>
    <div id="devtool-content">
      <div id="dom-tree-panel" class="active"></div>
      <div id="style-panel"></div>
      <div id="layout-panel"></div>
      <!-- D.3 — Console pane content fragment is inlined here via
           __INLINE_CONSOLE_HTML__ replacement (kConsolePanelHtml). -->
      <div id="console-panel">__INLINE_CONSOLE_HTML__</div>
    </div>
  </div>
  <!--
    TASK-20260502-02 B.2.1: Performance Overlay HUD (creative #1 决策 3 +
    plan §B.2.1). #devtool-hud 是 #devtool-root 的兄弟节点，absolute
    positioned 在 DevTool Document 视口内。data-passthrough="1" 占位以等
    R3+ EventManager HitTest 改造识别（pointer-events: none 不支持兜底）。
    HUD JS 每帧从 vx_view_get_perf_stats 读 stats 更新 #hud-fps innerHTML
    + 4 stage bars width（B.2.2 实施）。
  -->
  <div id="devtool-hud" data-passthrough="1">
    <div class="hud-row hud-fps">
      <span class="hud-label">FPS:</span>
      <span class="hud-value" id="hud-fps">--</span>
    </div>
    <div class="hud-row hud-stages">
      <div class="hud-bar"><span>S</span><div class="bar-fill" id="bar-style"></div></div>
      <div class="hud-bar"><span>L</span><div class="bar-fill" id="bar-layout"></div></div>
      <div class="hud-bar"><span>R</span><div class="bar-fill" id="bar-render"></div></div>
      <div class="hud-bar"><span>P</span><div class="bar-fill" id="bar-paint"></div></div>
    </div>
    <!--
      TASK-20260503-01 C.3.1 — Hot Reload status indicator.
      Reuses HUD container (one extra .hud-row) so absolute positioning
      and pointer-passthrough already apply for free. updateHotReloadStatus
      flips the class between status-watching (green tracked count) and
      status-error (red ERR badge) based on
      vx_devtool_get_hot_reload_status's last_error field.
    -->
    <div class="hud-row hud-hr">
      <span class="hud-label">HR:</span>
      <span class="hud-value status-watching" id="hot-reload-status">--</span>
    </div>
  </div>
  <script>__INLINE_JS__
__INLINE_CONSOLE_JS__</script>
</body>
</html>
